<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 深色圆角背景 -->
  <rect x="4" y="4" width="504" height="504" rx="148" fill="#14141f"/>
  
  <!-- 左下圆点（S的下端点） -->
  <circle cx="120" cy="390" r="40" fill="white"/>
  
  <!-- 右上圆点（S的上端点） -->
  <circle cx="392" cy="122" r="40" fill="white"/>
  
  <!-- 标准S形曲线：
       从左下圆点出发
       先向右上弯（下半段，像反C）
       中间经过中心
       再向右上弯（上半段，像正C）
       到达右上圆点
  -->
  <path d="M120 390 
           C180 390 200 320 256 280 
           C312 240 332 180 392 122" 
        stroke="white" 
        stroke-width="38" 
        stroke-linecap="round" 
        fill="none"/>
</svg>
