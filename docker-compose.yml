version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tuji-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tuji
      POSTGRES_PASSWORD: tuji123
      POSTGRES_DB: tuji_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: tuji-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tuji-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: tuji
      DB_PASSWORD: tuji123
      DB_DATABASE: tuji_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: tuji_jwt_secret_key_2024
    depends_on:
      - postgres
      - redis
    restart: always

  frontend:
    build:
      context: ./
      dockerfile: Dockerfile.frontend
    container_name: tuji-frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: always

  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: tuji-nginx
    ports:
      - '80:80'
    volumes:
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
